<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{block "title" .}}EarlyPass{{end}}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; margin: 0; padding: 0; }
  .wrapper { max-width: 560px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .header { background: {{.AccentColor}}; padding: 24px 40px; }
  .header-logo { display: block; height: 32px; }
  .header h1 { color: rgba(255,255,255,0.9); font-size: 15px; margin: 10px 0 0; font-weight: 500; }
  .body { padding: 40px; }
  .body p { color: #374151; font-size: 15px; line-height: 1.6; margin: 0 0 20px; }
  .btn { display: inline-block; background: {{.AccentColor}}; color: #fff !important; text-decoration: none; padding: 14px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; }
  .footer { padding: 20px 40px; border-top: 1px solid #f3f4f6; }
  .footer p { color: #9ca3af; font-size: 13px; margin: 0; }
  {{block "extra_styles" .}}{{end}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <img class="header-logo" src="https://www.earlypass.app/assets/logo.png" alt="EarlyPass">
    {{block "header_text" .}}{{end}}
  </div>
  <div class="body">
    {{block "content" .}}{{end}}
  </div>
  <div class="footer"><p>{{block "footer_content" .}}Sent by EarlyPass{{end}}</p></div>
</div>
</body>
</html>
