<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EarlyPass Dashboard</title>
  <link rel="stylesheet" href="./vendor/uPlot.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: #e2e8f0;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #22c55e;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 8px;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Layout */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; }
    .header-logo { font-weight: 700; font-size: 16px; color: var(--primary); }
    .header-campaign { font-size: 14px; color: var(--muted); margin-left: auto; }
    .layout { display: flex; flex: 1; }
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; }
    .nav-item { display: block; padding: 10px 20px; font-size: 14px; font-weight: 500; color: var(--muted); text-decoration: none; cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: background 0.1s, color 0.1s; }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: #ede9fe; color: var(--primary); }
    .main-content { flex: 1; padding: 32px; overflow-y: auto; }

    /* Cards & grids */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }

    /* Chart */
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
    .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .uplot { width: 100% !important; }

    /* Tables */
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
    .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .table-title { font-size: 14px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--bg); }
    td { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    /* Forms & inputs */
    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); }
    input, select, textarea { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: var(--surface); color: var(--text); outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px #e0e7ff; }
    textarea { resize: vertical; min-height: 80px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: background 0.1s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-success { background: #dcfce7; color: #15803d; }
    .badge-warning { background: #fef9c3; color: #854d0e; }
    .badge-muted { background: #f1f5f9; color: #475569; }
    .badge-danger { background: #fee2e2; color: #b91c1c; }

    /* Pagination */
    .pagination { display: flex; gap: 8px; align-items: center; padding: 12px 20px; border-top: 1px solid var(--border); font-size: 13px; }
    .pagination .info { color: var(--muted); margin-right: auto; }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; margin-bottom: 16px; }
    .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

    /* Settings */
    .settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .settings-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .settings-danger { border-color: var(--danger); }
    .settings-danger .settings-title { color: var(--danger); }
    .api-key-display { display: flex; gap: 8px; align-items: center; }
    .api-key-mono { font-family: monospace; font-size: 13px; background: var(--bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; flex: 1; letter-spacing: 0.05em; }

    /* Loading/empty */
    .loading { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
    .empty { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }

    /* Inline form in table for add-row */
    .inline-form { background: var(--bg); padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }

    /* Tooltip icon */
    .tooltip-icon { display: inline-flex; align-items: center; justify-content: center; width: 15px; height: 15px; border-radius: 50%; background: #e2e8f0; color: #64748b; font-size: 9px; font-weight: 700; cursor: help; margin-left: 4px; vertical-align: middle; position: relative; flex-shrink: 0; }
    .tooltip-icon::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; font-size: 12px; font-weight: 400; padding: 6px 10px; border-radius: 6px; white-space: normal; width: 220px; line-height: 1.4; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; }
    .tooltip-icon:hover::after { opacity: 1; }

    /* Inline code */
    code { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; background: var(--bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; color: var(--muted); }
    strong { color: var(--text); }

    /* Link separator (replaces &nbsp;·&nbsp;) */
    .link-sep { margin: 0 8px; color: var(--border); }

    /* Info banner */
    .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; }

    /* Setup page */
    .setup-grid { display: grid; grid-template-columns: 2fr 3fr; gap: 24px; align-items: start; }
    .setup-left-col { display: flex; flex-direction: column; gap: 16px; }
    .setup-left-col .settings-section { margin-bottom: 0; }
    .setup-preview-col { position: sticky; top: 24px; }
    @media (max-width: 960px) {
      .setup-grid { grid-template-columns: 1fr; }
      .setup-preview-col { position: static; order: -1; }
    }

    /* Theme toggle cards */
    .setup-theme-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .setup-theme-card { display: flex; flex-direction: column; gap: 0; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--surface); transition: border-color 0.15s; overflow: hidden; padding: 0; }
    .setup-theme-card:hover { border-color: #a5b4fc; }
    .setup-theme-card.active { border-color: var(--primary); }
    .setup-theme-thumb { height: 44px; width: 100%; }
    .setup-theme-thumb-light { background: linear-gradient(135deg, #f3f4f6 50%, #e5e7eb 50%); }
    .setup-theme-thumb-dark { background: linear-gradient(135deg, #111827 50%, #1f2937 50%); }
    .setup-theme-label { padding: 8px 12px; font-size: 13px; font-weight: 500; color: var(--muted); display: flex; align-items: center; gap: 6px; border-top: 1px solid var(--border); }
    .setup-theme-card.active .setup-theme-label { color: var(--primary); }

    /* Color swatches */
    .setup-swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .setup-swatch { width: 30px; height: 30px; border-radius: 6px; cursor: pointer; border: none; padding: 0; transition: transform 0.1s; outline: 2px solid transparent; outline-offset: 0; }
    .setup-swatch:hover { transform: scale(1.15); }
    .setup-swatch.active { outline-color: var(--text); outline-offset: 3px; }

    /* Embed code block */
    .setup-code-block { background: #1e293b; border-radius: 8px; overflow: hidden; }
    .setup-code-pre { margin: 0; padding: 16px; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; line-height: 1.65; color: #cbd5e1; word-break: break-all; white-space: pre-wrap; }
    .setup-code-footer { display: flex; justify-content: flex-end; padding: 8px 12px; border-top: 1px solid rgba(255,255,255,0.07); }
    .setup-code-copy { padding: 5px 14px; border-radius: 5px; font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.08); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.12); cursor: pointer; transition: background 0.1s, color 0.1s; }
    .setup-code-copy:hover { background: rgba(255,255,255,0.15); }
    .setup-code-copy.copied { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.35); color: #86efac; }

    /* Preview panel */
    .setup-preview-col .settings-section { margin-bottom: 0; padding: 0; overflow: hidden; }

    /* Browser chrome */
    .preview-chrome { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .preview-chrome-dots { display: flex; gap: 5px; }
    .preview-chrome-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); }
    .preview-chrome-url { flex: 1; padding: 3px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Preview tabs */
    .preview-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 14px; }
    .preview-tab { padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.1s, border-color 0.1s; }
    .preview-tab:hover { color: var(--text); }
    .preview-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Getting started steps */
    .setup-steps { display: flex; flex-direction: column; }
    .setup-step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .setup-step:last-child { border-bottom: none; padding-bottom: 0; }
    .setup-step-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 1px; }
    .setup-step-text { font-size: 13px; color: var(--text); line-height: 1.5; }

    /* Bulma resets — keep our own styles authoritative */
    .btn { line-height: normal; }
    input[type="color"], input[type="text"], input[type="number"], input[type="email"], input[type="url"], select, textarea { box-shadow: none; }
    input[type="radio"], input[type="checkbox"] { width: auto; height: auto; }
    h1, h2, h3, h4, h5, h6,
    .content h1, .content h2, .content h3, .content h4, .content h5, .content h6 { color: var(--text); font-size: unset; font-weight: unset; line-height: unset; margin: unset; }
    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    th, .table th { color: var(--muted) !important; background: var(--bg) !important; border-bottom: 1px solid var(--border) !important; border-width: 0 0 1px !important; }
    td, .table td { color: var(--text) !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.4c12e16b.js"></script>
</body>
</html>
