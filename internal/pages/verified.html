<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're confirmed!</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrapper { max-width: 480px; width: 100%; margin: 40px 20px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .header { background: #6366f1; padding: 24px 40px; text-align: center; }
  .header-logo { display: block; height: 32px; margin: 0 auto; }
  .body { padding: 40px; text-align: center; }
  .checkmark { font-size: 56px; line-height: 1; margin-bottom: 16px; }
  .body h2 { color: #111827; font-size: 20px; margin: 0 0 12px; font-weight: 600; }
  .body p { color: #374151; font-size: 15px; line-height: 1.6; margin: 0 0 20px; }
  .body p.muted { color: #9ca3af; font-size: 13px; margin: 0; }
  .footer { padding: 20px 40px; border-top: 1px solid #f3f4f6; text-align: center; }
  .footer p { color: #9ca3af; font-size: 13px; margin: 0; }
  .footer a { color: #6366f1; text-decoration: none; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header"><img class="header-logo" src="/assets/logo.svg" alt="EarlyPass"></div>
  <div class="body">
    <div class="checkmark">✅</div>
    <h2>You're confirmed!</h2>
    <p>Your email address has been verified and your spot on the waitlist is secured.</p>
    <p>Check your inbox — we sent you a welcome email with your referral link. Share it to move up the list!</p>
    <p class="muted">You can close this tab.</p>
  </div>
  <div class="footer"><p>Powered by <a href="https://earlypass.dev">EarlyPass</a></p></div>
</div>
</body>
</html>
