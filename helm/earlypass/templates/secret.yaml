apiVersion: v1
kind: Secret
metadata:
  name: {{ include "earlypass.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "earlypass.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required" .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ required "secrets.redisUrl is required" .Values.secrets.redisUrl | quote }}
  {{- if .Values.secrets.resendApiKey }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.emailFrom }}
  EMAIL_FROM: {{ .Values.secrets.emailFrom | quote }}
  {{- end }}
  {{- if .Values.secrets.dashboardJwtSecret }}
  DASHBOARD_JWT_SECRET: {{ .Values.secrets.dashboardJwtSecret | quote }}
  {{- end }}
