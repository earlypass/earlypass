name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & push multi-platform Docker image ─────────────────────────────
  docker:
    name: Docker — build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Package & push Helm chart to GHCR (OCI) ──────────────────────────────
  helm:
    name: Helm — package & push
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Lint Helm chart
        run: helm lint helm/earlypass/

      - name: Set chart version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" helm/earlypass/Chart.yaml
          sed -i "s/^version:.*/version: ${TAG}/" helm/earlypass/Chart.yaml

      - name: Package Helm chart
        run: helm package helm/earlypass/

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR
        run: |
          TAG=${GITHUB_REF_NAME#v}
          helm push earlypass-${TAG}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

