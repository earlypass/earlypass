name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prepare:
    name: Build JS assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            widget/package-lock.json
            dashboard/package-lock.json

      - name: Build widget
        run: cd widget && npm ci && npm run build

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Upload built assets
        uses: actions/upload-artifact@v7
        with:
          name: built-assets
          path: |
            widget/dist/
            internal/dashboard/static/
          retention-days: 1

  vet:
    name: Go — vet
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v6

      - name: Download built assets
        uses: actions/download-artifact@v8
        with:
          name: built-assets

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            **/*.go

      - name: go vet
        run: go vet -tags=integration ./...

  lint:
    name: Go — lint
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v6

      - name: Download built assets
        uses: actions/download-artifact@v8
        with:
          name: built-assets

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            **/*.go

      - name: golangci-lint
        run: go tool golangci-lint run

  test:
    name: Go — test
    runs-on: ubuntu-latest
    needs: [prepare]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: earlypass
          POSTGRES_PASSWORD: earlypass
          POSTGRES_DB: earlypass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U earlypass -d earlypass"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://earlypass:earlypass@localhost:5432/earlypass?sslmode=disable
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v6

      - name: Download built assets
        uses: actions/download-artifact@v8
        with:
          name: built-assets

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            **/*.go

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration -timeout=120s ./...

  widget:
    name: Widget build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Install dependencies
        run: cd widget && npm ci

      - name: Build widget
        run: cd widget && npm run build

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: cd dashboard && npm ci

      - name: Build dashboard
        run: cd dashboard && npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (no push)
        run: docker build -t earlypass:ci .

  helm:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Helm lint
        run: helm lint helm/earlypass/
