apiVersion: apps/v1
kind: Deployment
metadata:
  name: widget-testbed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: widget-testbed
  template:
    metadata:
      labels:
        app: widget-testbed
    spec:
      containers:
        - name: widget-testbed
          image: widget-testbed
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              value: postgres://earlypass:earlypass@postgres:5432/earlypass?sslmode=disable
            # API_URL is used in the rendered HTML — must be reachable from the browser
            - name: API_URL
              value: http://localhost:3000
            - name: TESTBED_PORT
              value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: widget-testbed
spec:
  selector:
    app: widget-testbed
  ports:
    - port: 4000
      targetPort: 4000
