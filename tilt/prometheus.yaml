apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers: []

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: earlypass
        static_configs:
          - targets: ['otel-collector:8889']
        metrics_path: /metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
data:
  earlypass.yml: |
    groups:
      - name: earlypass
        rules:
          - alert: EmailFailureRateHigh
            expr: |
              rate(earlypass_email_sent_total{status="failed"}[5m])
              /
              rate(earlypass_email_sent_total[5m]) > 0.05
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Email failure rate > 5%"

          - alert: WebhookFailureRateHigh
            expr: |
              rate(earlypass_webhook_deliveries_total{status="failed"}[5m])
              /
              rate(earlypass_webhook_deliveries_total[5m]) > 0.10
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Webhook failure rate > 10%"

          - alert: HTTPErrorRateHigh
            expr: |
              rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])
              /
              rate(http_server_request_duration_seconds_count[5m]) > 0.01
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "HTTP 5xx error rate > 1%"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.4.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
