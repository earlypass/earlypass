apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: earlypass
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  api.json: |
    {
      "title": "EarlyPass — API",
      "uid": "earlypass-api",
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s",
      "panels": [
        {
          "id": 1, "type": "timeseries", "title": "Request Rate (req/s)",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "rate(http_server_request_duration_seconds_count[1m])", "legendFormat": "{{http_route}}"}]
        },
        {
          "id": 2, "type": "timeseries", "title": "Latency p95 (ms)",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "histogram_quantile(0.95, rate(http_server_request_duration_seconds_bucket[5m])) * 1000", "legendFormat": "p95"}]
        },
        {
          "id": 3, "type": "timeseries", "title": "HTTP 5xx Error Rate",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [{"expr": "rate(http_server_request_duration_seconds_count{http_response_status_code=~'5..'}[5m])", "legendFormat": "5xx"}]
        },
        {
          "id": 4, "type": "timeseries", "title": "Latency p50 / p99 (ms)",
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8},
          "targets": [
            {"expr": "histogram_quantile(0.50, rate(http_server_request_duration_seconds_bucket[5m])) * 1000", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.99, rate(http_server_request_duration_seconds_bucket[5m])) * 1000", "legendFormat": "p99"}
          ]
        }
      ]
    }

  business.json: |
    {
      "title": "EarlyPass — Business",
      "uid": "earlypass-business",
      "time": {"from": "now-24h", "to": "now"},
      "refresh": "1m",
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Active Campaigns",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "earlypass_active_campaigns", "legendFormat": "campaigns"}]
        },
        {
          "id": 2, "type": "stat", "title": "Outbox Pending",
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "earlypass_outbox_pending", "legendFormat": "pending"}]
        },
        {
          "id": 3, "type": "timeseries", "title": "Signups / hour",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_signups_total[1h]) * 3600", "legendFormat": "{{source}}"}]
        },
        {
          "id": 4, "type": "timeseries", "title": "Email Verifications / hour",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_email_verifications_total[1h]) * 3600", "legendFormat": "{{source}}"}]
        },
        {
          "id": 5, "type": "timeseries", "title": "Referral Conversions / hour",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_referral_conversions_total[1h]) * 3600", "legendFormat": "{{campaign_id}}"}]
        },
        {
          "id": 6, "type": "timeseries", "title": "Invites Sent & Redeemed / hour",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [
            {"expr": "rate(earlypass_invites_sent_total[1h]) * 3600", "legendFormat": "sent"},
            {"expr": "rate(earlypass_invite_redeems_total[1h]) * 3600", "legendFormat": "redeemed"}
          ]
        },
        {
          "id": 7, "type": "timeseries", "title": "Email Sent / hour (by status)",
          "gridPos": {"x": 0, "y": 20, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_email_sent_total[1h]) * 3600", "legendFormat": "{{status}}"}]
        },
        {
          "id": 8, "type": "timeseries", "title": "Fraud Blocks / hour",
          "gridPos": {"x": 12, "y": 20, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_fraud_blocks_total[1h]) * 3600", "legendFormat": "{{reason}}"}]
        }
      ]
    }

  system.json: |
    {
      "title": "EarlyPass — System",
      "uid": "earlypass-system",
      "time": {"from": "now-1h", "to": "now"},
      "refresh": "30s",
      "panels": [
        {
          "id": 1, "type": "timeseries", "title": "Request Rate (req/s)",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_http_server_request_duration_seconds_count[1m])", "legendFormat": "{{http_route}}"}]
        },
        {
          "id": 2, "type": "timeseries", "title": "HTTP 5xx Error Rate",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_http_server_request_duration_seconds_count{http_response_status_code=~'5..'}[5m])", "legendFormat": "5xx"}]
        },
        {
          "id": 3, "type": "timeseries", "title": "Latency p50 / p95 / p99 (ms)",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [
            {"expr": "histogram_quantile(0.50, rate(earlypass_http_server_request_duration_seconds_bucket[5m])) * 1000", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, rate(earlypass_http_server_request_duration_seconds_bucket[5m])) * 1000", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, rate(earlypass_http_server_request_duration_seconds_bucket[5m])) * 1000", "legendFormat": "p99"}
          ]
        },
        {
          "id": 4, "type": "timeseries", "title": "Webhook Deliveries / hour",
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_webhook_deliveries_total[1h]) * 3600", "legendFormat": "{{status}}"}]
        },
        {
          "id": 5, "type": "timeseries", "title": "Magic Link Requests / hour",
          "gridPos": {"x": 0, "y": 16, "w": 12, "h": 8},
          "targets": [{"expr": "rate(earlypass_auth_magic_link_requests_total[1h]) * 3600", "legendFormat": "{{result}}"}]
        },
        {
          "id": 6, "type": "timeseries", "title": "Go Goroutines",
          "gridPos": {"x": 12, "y": 16, "w": 12, "h": 8},
          "targets": [{"expr": "earlypass_process_runtime_go_goroutines", "legendFormat": "goroutines"}]
        },
        {
          "id": 7, "type": "timeseries", "title": "Go Heap Alloc (MB)",
          "gridPos": {"x": 0, "y": 24, "w": 12, "h": 8},
          "targets": [{"expr": "earlypass_process_runtime_go_mem_heap_alloc_bytes / 1024 / 1024", "legendFormat": "heap MB"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.1
          ports:
            - containerPort: 3001
          env:
            - name: GF_SERVER_HTTP_PORT
              value: "3001"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3001
      targetPort: 3001
