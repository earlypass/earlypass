# .air.toml — hot-reload config for local development.
# Docs: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"
env_files = [".env.dev"]

[build]
  cmd = "make build-dashboard-dev && make build-widget && go build -o ./bin/server ./cmd/server"
  bin = "./bin/server"
  delay = 500
  exclude_dir = ["bin", "tmp", "helm", "dev", "node_modules", "widget/node_modules", "dashboard/node_modules", "widget/dist", "dashboard/dist", "internal/dashboard/static", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "ts", "tsx", "css", "js", "yaml", "sql"]
  include_dir = ["cmd", "internal", "api", "widget", "dashboard", "migrations"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true

[log]
  main_only = true
